<!DOCTYPE html><html><head><title>Test</title></head><body>
<script>
function detectMood(text) {
  var lower = text.toLowerCase();
  var scores = {};
  var moodKeys = Object.keys(MOOD_WORDS);
  for (var i = 0; i < moodKeys.length; i++) {
    var mood = moodKeys[i];
    var words = MOOD_WORDS[mood];
    var score = 0;
    for (var j = 0; j < words.length; j++) { if (lower.indexOf(words[j])) score++; }
    if (score > 0) scores[mood] = score;
  }
  var sorted = Object.keys(scores).sort(function(a, b) { return scores[b] - scores[a]; });
  var primaryMood = sorted.length > 0 ? sorted[0] : 'nostalgia';
  var intensity = Math.min(1, (sorted.length > 0 ? scores[sorted[0]] : 1) / 4);
  if (lower.match(/!\!/)) intensity = Math.min(1, intensity + 0.3);
  if (lower.match(/\.\.\./)) intensity = Math.max(0, intensity - 0.1);
  return { primaryMood: primaryMood, intensity: intensity };
}

var MOOD_WORDS = {test:'word'};

document.getElementById('result').textContent = detectMood('test word');
document.getElementById('result').textContent += ' - OK';
</script>
<body><div id="result"></div></body></html>
