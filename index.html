<body>
<div class="container">
<h1>Music Video Generator</h1>
<p class="subtitle">Gratis · In browser · Libreria persistente · Audio reattivo · Immagini AI</p>

<div class="panel">
<h2>Libreria Audio</h2>

<script>
// === DEBUG LOG ===
function log(msg) {
  console.log('[MV]', msg);
  const box = document.getElementById('debugBox');
  box.style.display = 'block';
  const t = new Date().toLocaleTimeString();
  box.innerHTML += `<div>[${t}] ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

// === INDEXEDDB LIBRARY ===
class AudioLibrary {
  constructor() {
    this.db = null;
    this.DB_NAME = 'MusicVideoDB';
    this.STORE = 'tracks';
    this.selectedId = null;
  }

  async init() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(this.STORE)) {
          db.createObjectStore(this.STORE, { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  async add(file) {
    let duration = 0;
    try { duration = await this.getDuration(file); } catch(e) {}
    
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(this.STORE, 'readwrite');
      const store = tx.objectStore(this.STORE);
      const record = {
        name: file.name,
        file: file,
        size: file.size,
        type: file.type || 'audio/mpeg',
        duration: duration,
        lyrics: '',
        dateAdded: Date.now()
      };
      const req = store.add(record);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  getDuration(file) {
    return new Promise((resolve) => {
      const url = URL.createObjectURL(file);
      const audio = new Audio();
      audio.preload = 'metadata';
      let done = false;
      const finish = (v) => { if (done) return; done = true; clearTimeout(t); URL.revokeObjectURL(url); resolve(v); };
      const t = setTimeout(() => finish(0), 6000);
      audio.onloadedmetadata = () => finish(audio.duration || 0);
      audio.onerror = () => finish(0);
      audio.src = url;
    });
  }

  async getAll() {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(this.STORE, 'readonly');
      const req = tx.objectStore(this.STORE).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async get(id) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(this.STORE, 'readonly');
      const req = tx.objectStore(this.STORE).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async updateLyrics(id, lyrics) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(this.STORE, 'readwrite');
      const store = tx.objectStore(this.STORE);
      const req = store.get(id);
      req.onsuccess = () => {
        const data = req.result;
        if (data) { data.lyrics = lyrics; store.put(data); }
        resolve();
      };
      req.onerror = () => reject(req.error);
    });
  }

  async remove(id) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(this.STORE, 'readwrite');
      const req = tx.objectStore(this.STORE).delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
}

// === GLOBALS ===
const library = new AudioLibrary();
let currentTrack = null;

const uploadZone = document.getElementById('uploadZone');
const audioUpload = document.getElementById('audioUpload');
const trackList = document.getElementById('trackList');
const lyricsInput = document.getElementById('lyrics');
const styleHint = document.getElementById('styleHint');
const generateBtn = document.getElementById('generateBtn');
const selectedBadge = document.getElementById('selectedBadge');
const autoSaveHint = document.getElementById('autoSaveHint');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const statusEl = document.getElementById('status');
const previewWrap = document.getElementById('previewWrap');
const preview = document.getElementById('preview');
const downloadBtn = document.getElementById('downloadBtn');

// === FORMAT HELPERS ===
function fmtTime(s) {
  if (!s || s === Infinity) return '??:??';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

// === RENDER LIBRARY ===
async function renderLibrary() {
  const tracks = await library.getAll();
  
  if (tracks.length === 0) {
    trackList.innerHTML = '<div class="empty-library">Nessuna traccia. Carica un file audio sopra.</div>';
    return;
  }

  trackList.innerHTML = tracks.map(t => `
    <div class="track-item ${library.selectedId === t.id ? 'selected' : ''}" data-id="${t.id}">
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-meta">${fmtTime(t.duration)} · ${fmtSize(t.size)}${t.lyrics ? ' · ✎ testo' : ''}</div>
      </div>
      <div class="track-actions">
        <audio controls preload="metadata" src="${URL.createObjectURL(t.file)}"></audio>
        <button class="sec" onclick="selectTrack(${t.id})">Usa</button>
        <button class="del" onclick="deleteTrack(${t.id})">✕</button>
      </div>
    </div>
  `).join('');
}

// === SELECT TRACK ===
async function selectTrack(id) {
  library.selectedId = id;
  const track = await library.get(id);
  currentTrack = track;
  
  lyricsInput.value = track.lyrics || '';
  generateBtn.disabled = false;
  selectedBadge.style.display = 'inline';
  autoSaveHint.textContent = '';
  
  await renderLibrary();
  log('Traccia selezionata: ' + track.name);
}

// === DELETE TRACK ===
async function deleteTrack(id) {
  if (!confirm('Eliminare questa traccia?')) return;
  await library.remove(id);
  if (library.selectedId === id) {
    library.selectedId = null;
    currentTrack = null;
    lyricsInput.value = '';
    generateBtn.disabled = true;
    selectedBadge.style.display = 'none';
  }
  await renderLibrary();
  log('Traccia eliminata');
}

// === AUTO-SAVE LYRICS ===
let saveTimeout = null;
lyricsInput.addEventListener('input', () => {
  if (!library.selectedId) return;
  autoSaveHint.textContent = 'salvataggio...';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    await library.updateLyrics(library.selectedId, lyricsInput.value);
    autoSaveHint.textContent = '✓ salvato con la traccia';
    setTimeout(() => { autoSaveHint.textContent = ''; }, 2000);
  }, 500);
});

// === UPLOAD HANDLERS ===
uploadZone.addEventListener('click', () => audioUpload.click());

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  await handleFiles(e.dataTransfer.files);
});

audioUpload.addEventListener('change', async (e) => {
  await handleFiles(e.target.files);
  audioUpload.value = '';
});

async function handleFiles(files) {
  for (const file of files) {
    log(`Caricamento: ${file.name} (${fmtSize(file.size)})`);
    try {
      const id = await library.add(file);
      log(`Salvato ID: ${id}`);
    } catch (err) {
      log('ERRORE: ' + err.message);
      alert('Errore con "' + file.name + '": ' + err.message);
    }
  }
  await renderLibrary();
}

// === MOOD COLORS ===
const MOOD_COLORS = {
  'melancolico': ['#1a1a3e', '#2d1b69', '#0f0c29'],
  'triste': ['#0c0c1d', '#1a1a2e', '#16213e'],
  'allegro': ['#ff6b6b', '#feca57', '#ff9ff3'],
  'energico': ['#f72585', '#7209b7', '#3a0ca3'],
  'romantico': ['#e91e63', '#9c27b0', '#f48fb1'],
  'rabbioso': ['#d32f2f', '#b71c1c', '#4a0000'],
  'calmo': ['#006064', '#00838f', '#4dd0e1'],
  'epico': ['#ff6f00', '#e65100', '#bf360c'],
  'misterioso': ['#1a237e', '#311b92', '#0d0d2b'],
  'nostalgico': ['#4e342e', '#3e2723', '#8d6e63'],
  'default': ['#0f0c29', '#302b63', '#24243e']
};

function getMoodColors(mood) {
  const m = (mood || '').toLowerCase();
  for (const [key, colors] of Object.entries(MOOD_COLORS)) {
    if (m.includes(key)) return colors;
  }
  return MOOD_COLORS.default;
}

// === PARSE LYRICS TO SCENES ===
function parseScenes(lyrics, duration) {
  const blocks = lyrics.split(/\n\s*\n/).filter(b => b.trim());
  if (blocks.length === 0) return [{ text: lyrics, mood: 'default', start: 0, end: duration || 60 }];
  
  const sceneDuration = (duration || 60) / blocks.length;
  const moods = ['melancolico', 'allegro', 'energico', 'romantico', 'calmo', 'epico', 'misterioso', 'nostalgico'];
  
  return blocks.map((text, i) => ({
    text: text.trim(),
    mood: moods[i % moods.length],
    start: i * sceneDuration,
    end: (i + 1) * sceneDuration
  }));
}

// === GENERATE IMAGE PROMPT ===
function generatePrompt(sceneText, style) {
  const stylePart = style ? `, ${style} style` : ', cinematic style';
  const clean = sceneText.replace(/\[.*?\]/g, '').substring(0, 200);
  return encodeURIComponent(`music video still${stylePart}, moody atmosphere, dramatic lighting, ${clean}`);
}

// === LOAD IMAGE ===
function loadImage(prompt) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const seed = Math.floor(Math.random() * 999999);
    img.src = `https://image.pollinations.ai/prompt/${prompt}?width=1280&height=720&seed=${seed}&nologo=true`;
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    setTimeout(() => reject(new Error('Timeout')), 30000);
  });
}

// === AUDIO ANALYSIS ===
class AudioAnalyzer {
  constructor(audioElement) {
    this.audio = audioElement;
    this.ctx = null;
    this.analyser = null;
    this.data = null;
    this.bass = 0;
    this.mid = 0;
    this.high = 0;
    this.energy = 0;
    this.prevEnergy = 0;
    this.beat = false;
  }

  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const source = this.ctx.createMediaElementSource(this.audio);
    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 256;
    source.connect(this.analyser);
    this.analyser.connect(this.ctx.destination);
    this.data = new Uint8Array(this.analyser.frequencyBinCount);
  }

  update() {
    if (!this.analyser) return;
    this.analyser.getByteFrequencyData(this.data);
    
    const len = this.data.length;
    let bassSum = 0, midSum = 0, highSum = 0;
    const bassEnd = Math.floor(len * 0.15);
    const midEnd = Math.floor(len * 0.5);
    
    for (let i = 0; i < bassEnd; i++) bassSum += this.data[i];
    for (let i = bassEnd; i < midEnd; i++) midSum += this.data[i];
    for (let i = midEnd; i < len; i++) highSum += this.data[i];
    
    this.prevEnergy = this.energy;
    this.bass = bassSum / (bassEnd * 255);
    this.mid = midSum / ((midEnd - bassEnd) * 255);
    this.high = highSum / ((len - midEnd) * 255);
    this.energy = (this.bass + this.mid + this.high) / 3;
    
    const threshold = 0.15;
    this.beat = this.energy - this.prevEnergy > threshold && this.energy > 0.3;
  }
}

// === PARTICLES ===
class Particle {
  constructor(w, h) {
    this.reset(w, h);
  }
  reset(w, h) {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.size = Math.random() * 3 + 1;
    this.alpha = Math.random() * 0.5 + 0.2;
    this.life = Math.random() * 100 + 50;
    this.maxLife = this.life;
  }
  update(w, h, energy) {
    this.x += this.vx * (1 + energy * 3);
    this.y += this.vy * (1 + energy * 3);
    this.life--;
    if (this.life <= 0 || this.x < 0 || this.x > w || this.y < 0 || this.y > h) {
      this.reset(w, h);
    }
  }
  draw(ctx, color) {
    const a = this.alpha * (this.life / this.maxLife);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color.replace('1)', `${a})`);
    ctx.fill();
  }
}

// === MAIN GENERATE ===
async function generate() {
  if (!currentTrack) return alert('Seleziona una traccia!');
  
  const lyrics = lyricsInput.value.trim();
  if (!lyrics) return alert('Inserisci il testo!');
  
  const style = styleHint.value.trim();
  const audioFile = currentTrack.file;
  
  generateBtn.disabled = true;
  progress.style.display = 'block';
  progressBar.style.width = '0%';
  statusEl.textContent = 'Caricamento audio...';
  log('Inizio generazione');
  
  // Create audio element
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  const audioUrl = URL.createObjectURL(audioFile);
  audio.src = audioUrl;
  
  await new Promise((resolve, reject) => {
    audio.onloadedmetadata = resolve;
    audio.onerror = reject;
  });
  
  const duration = audio.duration;
  log('Durata audio: ' + fmtTime(duration));
  
  // Parse scenes
  statusEl.textContent = 'Analisi testo...';
  const scenes = parseScenes(lyrics, duration);
  log('Scene trovate: ' + scenes.length);
  
  // Generate images
  const images = [];
  for (let i = 0; i < scenes.length; i++) {
    statusEl.textContent = `Generazione immagine ${i + 1}/${scenes.length}...`;
    progressBar.style.width = `${((i + 1) / scenes.length) * 50}%`;
    log(`Immagine ${i + 1}: ${scenes[i].mood}`);
    
    try {
      const prompt = generatePrompt(scenes[i].text, style);
      const img = await loadImage(prompt);
      images.push(img);
      log(`Immagine ${i + 1} OK`);
    } catch (e) {
      log(`Immagine ${i + 1} fallita: ${e.message}`);
      images.push(null);
    }
  }
  
  statusEl.textContent = 'Preparazione canvas...';
  progressBar.style.width = '55%';
  
  // Setup canvas
  const W = 1280, H = 720;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  
  // Setup audio analyzer
  const analyzer = new AudioAnalyzer(audio);
  analyzer.init();
  
  // Setup particles
  const particles = [];
  for (let i = 0; i < 60; i++) particles.push(new Particle(W, H));
  
  // Animation state
  let startTime = null;
  let currentScene = 0;
  let kenBurnsX = 0, kenBurnsY = 0;
  let flashAlpha = 0;
  
  // Setup recording
  const stream = canvas.captureStream(30);
  
  // Add audio to stream
  const audioCtx = analyzer.ctx;
  const dest = audioCtx.createMediaStreamDestination();
  const sourceNode = audioCtx.createMediaElementSource(audio);
  sourceNode.connect(dest);
  sourceNode.connect(audioCtx.destination);
  
  const audioTrack = dest.stream.getAudioTracks()[0];
  if (audioTrack) stream.addTrack(audioTrack);
  
  const recorder = new MediaRecorder(stream, { 
    mimeType: 'video/webm;codecs=vp9,opus',
    videoBitsPerSecond: 4000000 
  });
  const chunks = [];
  recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  
  const recordingDone = new Promise((resolve) => {
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      resolve(blob);
    };
  });
  
  // Render loop
  function render(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = (timestamp - startTime) / 1000;
    
    // Update audio analysis
    analyzer.update();
    
    // Find current scene
    for (let i = scenes.length - 1; i >= 0; i--) {
      if (elapsed >= scenes[i].start) {
        currentScene = i;
        break;
      }
    }
    
    const scene = scenes[currentScene];
    const colors = getMoodColors(scene.mood);
    const img = images[currentScene];
    
    // Ken Burns effect
    kenBurnsX += 0.0003 * (1 + analyzer.energy * 2);
    kenBurnsY += 0.0002 * (1 + analyzer.energy);
    
    // Beat flash
    if (analyzer.beat) flashAlpha = 0.4;
    flashAlpha *= 0.92;
    
    // Clear
    ctx.fillStyle = colors[0];
    ctx.fillRect(0, 0, W, H);
    
    // Draw image with Ken Burns
    if (img) {
      ctx.save();
      const scale = 1.15 + Math.sin(kenBurnsX) * 0.05 + analyzer.bass * 0.05;
      const ox = Math.sin(kenBurnsY) * 30;
      const oy = Math.cos(kenBurnsX * 0.7) * 20;
      ctx.translate(W / 2 + ox, H / 2 + oy);
      ctx.scale(scale, scale);
      ctx.translate(-W / 2, -H / 2);
      ctx.drawImage(img, 0, 0, W, H);
      ctx.restore();
    }
    
    // Gradient overlay
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(0,0,0,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    // Particles
    particles.forEach(p => {
      p.update(W, H, analyzer.energy);
      p.draw(ctx, 'rgba(255,255,255,1)');
    });
    
    // Beat flash
    if (flashAlpha > 0.01) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
    
    // Audio visualizer bars at bottom
    if (analyzer.data) {
      const barCount = 64;
      const barWidth = W / barCount;
      for (let i = 0; i < barCount; i++) {
        const val = (analyzer.data[i] || 0) / 255;
        const barH = val * 80;
        const hue = (i / barCount) * 60 + 300;
        ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${0.4 + val * 0.4})`;
        ctx.fillRect(i * barWidth, H - barH, barWidth - 1, barH);
      }
    }
    
    // Subtitle
    const lines = scene.text.split('\n').filter(l => l.trim());
    if (lines.length > 0) {
      const sceneProgress = (elapsed - scene.start) / (scene.end - scene.start);
      const lineIdx = Math.min(Math.floor(sceneProgress * lines.length), lines.length - 1);
      const line = lines[lineIdx];
      
      ctx.font = 'bold 36px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText(line, W / 2 + 2, H - 120 + 2);
      
      // Text
      ctx.fillStyle = '#ffffff';
      ctx.fillText(line, W / 2, H - 120);
    }
    
    // Progress
    const progress = elapsed / duration;
    progressBar.style.width = `${55 + progress * 45}%`;
    statusEl.textContent = `Registrazione... ${fmtTime(elapsed)} / ${fmtTime(duration)}`;
    
    if (elapsed < duration) {
      requestAnimationFrame(render);
    } else {
      recorder.stop();
      audio.pause();
      log('Registrazione completata');
    }
  }
  
  // Start
  statusEl.textContent = 'Registrazione in corso...';
  recorder.start(1000);
  audio.play();
  requestAnimationFrame(render);
  
  // Wait for recording
  const blob = await recordingDone;
  
  // Show preview
  const url = URL.createObjectURL(blob);
  preview.src = url;
  previewWrap.style.display = 'block';
  downloadBtn.href = url;
  downloadBtn.style.display = 'inline-block';
  downloadBtn.download = `${currentTrack.name.replace(/\.[^.]+$/, '')}-video.webm`;
  
  progress.style.display = 'none';
  statusEl.textContent = 'Video pronto!';
  generateBtn.disabled = false;
  
  log('Fatto! Video generato.');
  
  // Cleanup
  URL.revokeObjectURL(audioUrl);
}

generateBtn.addEventListener('click', generate);

// === INIT ===
(async () => {
  try {
    log('Inizializzazione...');
    await library.init();
    log('DB pronto');
    await renderLibrary();
    log('Libreria caricata');
  } catch (err) {
    log('ERRORE INIT: ' + err.message);
    trackList.innerHTML = '<div class="empty-library" style="color:#f66;">Errore: ' + err.message + '<br>Usa un server HTTP (non file://)</div>';
  }
})();
</script>
